name: RunPod Leadium Q&A Agent

on:
  schedule:
    - cron: "0 * * * *"   # every hour on the hour
  workflow_dispatch:       # manual trigger from GitHub UI
    inputs:
      probe_email:
        description: "Diagnostic: dump email thread + classification for one contact (no sheet writes). Leave blank for a normal run."
        required: false
        default: ""

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - uses: actions/setup-python@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Google service account file
        run: echo "${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}" | base64 -d > service_account.json

      - name: Run agent
        env:
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          HUBSPOT_ACCESS_TOKEN: ${{ secrets.HUBSPOT_ACCESS_TOKEN }}
          GOOGLE_SHEETS_ID:     ${{ secrets.GOOGLE_SHEETS_ID }}
          WORKSHEET_NAME:       ${{ vars.WORKSHEET_NAME }}
          PROBE_EMAIL:          ${{ github.event.inputs.probe_email }}
        run: python agent.py
